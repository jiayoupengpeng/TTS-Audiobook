<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>EdgeTTS有声书生成</title>
    <style>
        *{box-sizing: border-box;margin:0;padding:0;}
        body{width:96%;margin:20px auto;font-size:15px;}
        .wrap{display:flex;gap:20px;}
        .left-box{width:52%;}
        .right-box{width:48%;}
        textarea{width:100%;height:220px;margin:8px 0;}
        .status-top{background:#eef6ff;padding:10px 15px;border:1px solid #99ccff;border-radius:6px;margin:8px 0 12px 0;font-weight:bold;color:#004499;}
        .log-area{width:100%;height:520px;border:1px solid #ccc;padding:8px;overflow-y:auto;background:#fafafa;white-space:pre-line;}
    </style>
</head>
<body>
    <h2>Edge-TTS 文本转有声书</h2>
    <div class="status-top" id="topStatus">🔔 当前任务状态：{{task_status}}</div>
    <div class="wrap">
        <div class="left-box">
            <form action="/submit" method="post" enctype="multipart/form-data">
                <div>
                    <label>选择音色：</label>
                    <select name="voice" required>
                        {% for v in voice_list %}
                        <option value="{{v}}" {% if last_voice == v %}selected{% endif %}>{{v[:-4]}}</option>
                        {% endfor %}
                    </select>
                    &nbsp;&nbsp;
                    <label>语速：</label>
                    <input name="speed" value="{{last_speed}}">
                </div>
                <br>
                <div>
                    <label>正文：</label><br>
                    <textarea name="text">{{last_text}}</textarea>
                </div>
                <p>TXT文件：<input type="file" name="txtfile" accept=".txt"></p>
                <button type="submit">提交生成</button>
            </form>
            <hr>
            <h3>成品列表</h3>
            <div id="mp3List">
                {% for f in files %}
                <p>{{f}} <a href="/download/{{f}}">下载</a></p>
                {% endfor %}
            </div>
        </div>
        <div class="right-box">
            <h3>运行日志</h3>
            <div class="log-area" id="logBox"></div>
        </div>
    </div>

<script>
const statusDom = document.getElementById('topStatus');
const logDom = document.getElementById('logBox');
const listDom = document.getElementById('mp3List');
let timer = null;
const INTERVAL = 3000;

function getData(){
    fetch("/api/get_runtime")
    .then(res=>res.json())
    .then(data=>{
        statusDom.innerText = "🔔 当前任务状态："+data.status;
        logDom.innerText = data.logs.join("\n");
        logDom.scrollTop = logDom.scrollHeight;
        let html = "";
        data.mp3list.forEach(item=>html += `<p>${item} <a href="/download/${item}">下载</a></p>`);
        listDom.innerHTML = html;
        if(data.status.includes("空闲待命") || data.status.includes("任务异常终止")){
            clearInterval(timer);
            timer = null;
        }
    })
}
document.querySelector("form").addEventListener("submit",()=>{
    if(timer) clearInterval(timer);
    timer=null;
    setTimeout(getData,200);
    timer = setInterval(getData,INTERVAL);
})
</script>
</body>
</html>
