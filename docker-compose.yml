version: "3.8"

services:
  tts-audiobook:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/jiayoupengpeng/tts-audiobook:latest
    container_name: tts-audiobook
    ports:
      - "8080:8000"
    volumes:
      - ./output:/app/output
      - ./metadata.db:/app/metadata.db:ro
      # 挂载 Calibre 书库（实际书文件目录）
      # - /path/to/calibre/library:/books:ro
    environment:
      - TZ=Asia/Shanghai
      - CALIBRE_DB=/app/metadata.db
      # 设置书库目录（与 volumes 对应）
      # - CALIBRE_LIBRARY=/books
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
